- name: Create challenges in CTFd
  hosts: ctfd
  tasks:
    - name: Add challenges via API
      uri:
        url: "{{ ctfd_api_url }}/challenges"
        method: POST
        headers:
          Authorization: "Token {{ ctfd_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ item.name }}"
          category: "{{ item.category }}"
          description: "{{ item.description }}"
          value: "{{ item.value }}"
          type: "{{ item.type }}"
          state: "visible"
          max_attempts: 0
          connection_info: ""
          tags: []
          hints: []
        status_code: 200
      loop: "{{ ctfd_challenges.exploitation_easy 
               + ctfd_challenges.exploitation_medium 
               + ctfd_challenges.exploitation_hard 
               + ctfd_challenges.blue_team }}"
      register: created_challenges

    - name: Add flags for each challenge
      uri:
        url: "{{ ctfd_api_url }}/flags"
        method: POST
        headers:
          Authorization: "Token {{ ctfd_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          challenge_id: "{{ item.0.json.data.id }}"
          content: "{{ item.1.flag }}"
          type: "static"
        status_code: 200
      loop: "{{ created_challenges.results 
               | zip(ctfd_challenges.exploitation_easy 
                     + ctfd_challenges.exploitation_medium 
                     + ctfd_challenges.exploitation_hard 
                     + ctfd_challenges.blue_team) 
               | list }}"

